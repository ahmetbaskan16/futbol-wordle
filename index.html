<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>Football Hub - Wordle, Düello & Quiz</title>
  <meta name="description" content="Futbol temalı Wordle, Logo Quiz, Kariyer, Daily, Blitz ve Düello modları. Arkadaşlarınla yarış!" />
  <link rel="manifest" href="/manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <header>
    <div class="header-actions">
      <button class="icon-btn" id="mute-btn" onclick="toggleMute()" title="Ses">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      </button>
      <button class="icon-btn" onclick="toggleTheme()" title="Tema">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <button class="icon-btn" onclick="toggleStats()" title="İstatistikler">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
      </button>
    </div>
    <h1>FOOTBALL HUB</h1>
    <div class="subtitle" id="game-subtitle">MODUNU SEÇ</div>
  </header>

  <div class="mode-switcher">
    <button class="mode-btn" id="mode-club"    onclick="switchMode('club')">CLUB</button>
    <button class="mode-btn" id="mode-player"  onclick="switchMode('player')">PLAYER</button>
    <button class="mode-btn" id="mode-manager" onclick="switchMode('manager')">MANAGER</button>
    <button class="mode-btn" id="mode-quiz"    onclick="switchMode('quiz')">LOGO</button>
    <button class="mode-btn" id="mode-daily"   onclick="switchMode('daily')">DAILY ⭐</button>
    <button class="mode-btn" id="mode-blitz"   onclick="switchMode('blitz')">BLITZ ⚡</button>
    <button class="mode-btn" id="mode-career"  onclick="switchMode('career')">KARİYER 📜</button>
    <button class="mode-btn" id="mode-duel"    onclick="startNewDuel()">DÜELLO ⚔️</button>
  </div>

  <div id="game-container">

    <div id="blitz-bar" style="display:none;">
      <div class="blitz-timer"><span id="blitz-time">60</span>s</div>
      <div class="meta">Puan: <strong id="blitz-score">0</strong></div>
    </div>

    <div id="duel-bar" style="display:none;">
      <div class="duel-row">
        <span class="chip">Tur <strong id="duel-round">0/0</strong></span>
        <span class="chip">Puanım: <strong id="duel-score">0</strong></span>
        <span class="chip muted" id="duel-code">#</span>
      </div>
      <button class="link-btn" onclick="copyDuelLink()">🔗 LİNKİ KOPYALA & ARKADAŞA GÖNDER</button>
    </div>

    <div id="career-clue" style="display:none;"></div>

    <div id="wordle-content">
      <div class="info-bar">
        <span class="chip"><strong id="info-length">0</strong> harf</span>
        <button class="hint-btn" onclick="useHint()">💡 İPUCU (<span id="hints-left">3</span>)</button>
      </div>
      <div id="game-board"></div>
      <div id="keyboard">
        <div class="kb-row">
          <button class="key" data-key="Q">Q</button><button class="key" data-key="W">W</button><button class="key" data-key="E">E</button><button class="key" data-key="R">R</button><button class="key" data-key="T">T</button><button class="key" data-key="Y">Y</button><button class="key" data-key="U">U</button><button class="key" data-key="I">I</button><button class="key" data-key="O">O</button><button class="key" data-key="P">P</button>
        </div>
        <div class="kb-row">
          <button class="key" data-key="A">A</button><button class="key" data-key="S">S</button><button class="key" data-key="D">D</button><button class="key" data-key="F">F</button><button class="key" data-key="G">G</button><button class="key" data-key="H">H</button><button class="key" data-key="J">J</button><button class="key" data-key="K">K</button><button class="key" data-key="L">L</button>
        </div>
        <div class="kb-row">
          <button class="key large" data-key="ENTER">ENTER</button><button class="key" data-key="Z">Z</button><button class="key" data-key="X">X</button><button class="key" data-key="C">C</button><button class="key" data-key="V">V</button><button class="key" data-key="B">B</button><button class="key" data-key="N">N</button><button class="key" data-key="M">M</button><button class="key large" data-key="BACKSPACE">⌫</button>
        </div>
      </div>
    </div>

    <div id="quiz-container">
      <div class="quiz-card">
        <div class="logo-box"><img id="quiz-logo" class="logo-img blurred" src="" alt="Kulüp Logosu" /></div>
        <div class="options-grid" id="quiz-options"></div>
      </div>
    </div>
  </div>

  <!-- Login -->
  <div id="login-overlay" class="overlay">
    <div class="modal">
      <h2>İSMİN NE?</h2>
      <p class="muted-text">Skorlarını kaydetmek için bir takma ad gir.</p>
      <input type="text" id="username-input" class="modern-input" placeholder="İsmin" maxlength="15" />
      <button class="btn-restart" onclick="registerUser()">BAŞLA</button>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats-overlay" class="overlay">
    <div class="modal wide">
      <div class="close-modal" onclick="toggleStats()">✕</div>
      <h2>İSTATİSTİKLER</h2>
      <div class="stats-grid">
        <div class="stat-item"><span class="value" id="stats-played">0</span><span class="label">Oynanan</span></div>
        <div class="stat-item"><span class="value" id="stats-score">0</span><span class="label">Puan</span></div>
        <div class="stat-item"><span class="value" id="stats-streak">0</span><span class="label">Seri</span></div>
        <div class="stat-item"><span class="value" id="stats-max">0</span><span class="label">Rekor</span></div>
        <div class="stat-item"><span class="value" id="stats-winrate">0%</span><span class="label">Kazanç</span></div>
        <div class="stat-item"><span class="value" id="stats-duels">0</span><span class="label">Düello</span></div>
        <div class="stat-item"><span class="value" id="stats-blitz">0</span><span class="label">Blitz Rekor</span></div>
        <div class="stat-item"><span class="value" id="stats-daily">0</span><span class="label">Daily Seri</span></div>
      </div>

      <h3 class="sec-title">🏅 ROZETLER</h3>
      <div id="badges-grid" class="badges-grid"></div>

      <h3 class="sec-title">🌍 GLOBAL SKOR TABLOSU</h3>
      <div class="leaderboard-list" id="leaderboard"></div>
      <button class="btn-restart" onclick="location.reload()">YENİ OYUN</button>
    </div>
  </div>

  <!-- End Game -->
  <div id="end-overlay" class="overlay">
    <div class="modal">
      <h2 id="end-title">KAZANDIN!</h2>
      <p class="muted-text">Cevap:</p>
      <h3 id="end-answer" class="answer">-</h3>
      <pre class="share-grid" id="end-share-grid"></pre>
      <button class="btn-restart" onclick="shareResult()">📤 PAYLAŞ</button>
      <button class="btn-secondary" onclick="closeEndGame()">YENİDEN OYNA</button>
    </div>
  </div>

  <div id="badge-pop" class="badge-pop"></div>
  <div id="toast" class="toast"></div>

  <script type="module" src="/js/game.js"></script>
</body>
</html>
