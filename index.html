<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elite Football Wordle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  /* (Buraya mevcut CSS kodlarınızı ekleyebilirsiniz, ya da aynı şekilde bırakabilirsiniz) */
  /* Yalnızca sıralama bölümüne uygun stil ekledim. */
  .leaderboard-list {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 10px;
  }
</style>
</head>
<body>
<header>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleStats()" title="Leaderboard">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
    </button>
  </div>
  <h1>FOOTBALL WORDLE</h1>
  <div class="subtitle">THE ULTIMATE CLUB CHALLENGE</div>
</header>

<div id="game-container">
  <div id="game-board"></div>
  <div id="keyboard">
    <!-- Klavye burada -->
    <div class="kb-row">
      <button class="key" data-key="Q">Q</button>
      <button class="key" data-key="W">W</button>
      <button class="key" data-key="E">E</button>
      <button class="key" data-key="R">R</button>
      <button class="key" data-key="T">T</button>
      <button class="key" data-key="Y">Y</button>
      <button class="key" data-key="U">U</button>
      <button class="key" data-key="I">I</button>
      <button class="key" data-key="O">O</button>
      <button class="key" data-key="P">P</button>
    </div>
    <div class="kb-row">
      <button class="key" data-key="A">A</button>
      <button class="key" data-key="S">S</button>
      <button class="key" data-key="D">D</button>
      <button class="key" data-key="F">F</button>
      <button class="key" data-key="G">G</button>
      <button class="key" data-key="H">H</button>
      <button class="key" data-key="J">J</button>
      <button class="key" data-key="K">K</button>
      <button class="key" data-key="L">L</button>
    </div>
    <div class="kb-row">
      <button class="key large" data-key="ENTER">ENTER</button>
      <button class="key" data-key="Z">Z</button>
      <button class="key" data-key="X">X</button>
      <button class="key" data-key="C">C</button>
      <button class="key" data-key="V">V</button>
      <button class="key" data-key="B">B</button>
      <button class="key" data-key="N">N</button>
      <button class="key" data-key="M">M</button>
      <button class="key large" data-key="BACKSPACE">⌫</button>
    </div>
  </div>
</div>

<!-- İstatistikler ve sıralama modal -->
<div id="stats-overlay" class="overlay" style="display:none;">
  <div id="stats-modal" class="modal">
    <div class="close-modal" onclick="toggleStats()">✕</div>
    <h2>STATISTICS</h2>
    <div class="stats-grid">
      <div class="stat-item"><span class="value" id="stats-played">0</span><span class="label">Played</span></div>
      <div class="stat-item"><span class="value" id="stats-winpct">0</span><span class="label">Win %</span></div>
      <div class="stat-item"><span class="value" id="stats-streak">0</span><span class="label">Streak</span></div>
      <div class="stat-item"><span class="value" id="stats-max">0</span><span class="label">Max</span></div>
    </div>
    <h3>BEST RUNS</h3>
    <div class="leaderboard-list" id="leaderboard"></div>
    <h3>GLOBAL SIRALAMA</h3>
    <div class="leaderboard-list" id="global-leaderboard"></div>
    <button class="btn-restart" id="modal-action-btn" onclick="location.reload()">PLAY AGAIN</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // Oyuncu ismi ve global sıralama
  let playerName = localStorage.getItem('playerName');
  if (!playerName) {
    playerName = prompt('Lütfen isminizi girin:');
    if (playerName) {
      localStorage.setItem('playerName', playerName);
    } else {
      playerName = 'Misafir';
    }
  }

  let globalLeaderboard = JSON.parse(localStorage.getItem('globalLeaderboard')) || [];

  const CLUBS = [
    'Fenerbahce', 'Fenerbahce', 'Fenerbahce', 'Fenerbahce', 'Fenerbahce',
    'Galatasaray', 'Besiktas', 'Trabzonspor', 'Eyupspor', 'Basaksehir',
    'Kasimpasa', 'Sivasspor', 'Antalyaspor', 'Konyaspor', 'Alanyaspor',
    'Rizespor', 'Goztepe', 'Gaziantep', 'Samsunspor', 'Bodrumspor',
    'Adana Demirspor', 'Hatayspor', 'Kayserispor', 'Sakaryaspor', 'Ankaragucu',
    'Kocaelispor', 'Genclerbirligi', 'Altay', 'Istanbulspor', 'Bursaspor',
    'Real Madrid', 'Barcelona', 'Atletico Madrid', 'Manchester City', 'Arsenal',
    'Liverpool', 'Manchester United', 'Chelsea', 'Bayern Munich', 'Borussia Dortmund',
    'Juventus', 'Inter Milan', 'AC Milan', 'Napoli', 'AS Roma', 'PSG', 'Boca Juniors'
  ];

  function normalize(str) {
    return str.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/İ/g, 'I').replace(/Ğ/g, 'G').replace(/Ü/g, 'U').replace(/Ş/g, 'S').replace(/Ö/g, 'O').replace(/Ç/g, 'C');
  }

  const rawTarget = CLUBS[Math.floor(Math.random() * CLUBS.length)];
  const targetWord = normalize(rawTarget);
  const targetLettersOnly = targetWord.replace(/[^A-Z]/g, '');
  const letterCount = targetLettersOnly.length;

  let currentRow = 0;
  let currentLetterIndex = 0;
  let gameOver = false;
  let startTime = Date.now();
  const attempts = 6;
  const guesses = Array.from({ length: attempts }, () => []);

  const board = document.getElementById('game-board');
  const statsOverlay = document.getElementById('stats-overlay');
  const toast = document.getElementById('toast');

  // İstatistikler ve puanlar
  let stats = JSON.parse(localStorage.getItem('wordleStats')) || {
    played: 0,
    wins: 0,
    streak: 0,
    maxStreak: 0,
    bestRuns: []
  };

  function saveStats() {
    localStorage.setItem('wordleStats', JSON.stringify(stats));
  }

  // Init Board
  function initBoard() {
    for (let i = 0; i < attempts; i++) {
      const row = document.createElement('div');
      row.className = 'row';
      row.id = `row-${i}`;
      let letterIdx = 0;
      for (let char of targetWord) {
        const tile = document.createElement('div');
        if (char === ' ' || char === '-') {
          tile.className = 'tile space'; tile.textContent = char;
        } else {
          tile.className = 'tile'; tile.id = `tile-${i}-${letterIdx}`; letterIdx++;
        }
        row.appendChild(tile);
      }
      board.appendChild(row);
    }
  }

  function showToast(msg) {
    toast.textContent = msg; toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function updateBoard() {
    const rowTiles = document.querySelectorAll(`#row-${currentRow} .tile:not(.space)`);
    rowTiles.forEach((tile, idx) => {
      tile.textContent = guesses[currentRow][idx] || '';
      tile.classList.toggle('pop', !!guesses[currentRow][idx]);
    });
  }

  async function submitGuess() {
    const currentGuess = guesses[currentRow].join('');
    if (currentGuess.length !== letterCount) { showToast("NOT ENOUGH LETTERS"); return; }

    // Eğer "Galatasaray" ise özel mesaj
    if (currentGuess === normalize('Galatasaray')) { showToast("Cidden mi? Limon sıktın keyfimize... 🍋"); }

    const rowTiles = document.querySelectorAll(`#row-${currentRow} .tile:not(.space)`);
    const targetArr = targetLettersOnly.split('');
    const guessArr = currentGuess.split('');
    const states = new Array(letterCount).fill('absent');

    guessArr.forEach((char, i) => { if (char === targetArr[i]) { states[i] = 'correct'; targetArr[i] = null; } });
    guessArr.forEach((char, i) => { if (states[i] !== 'correct') { let idx = targetArr.indexOf(char); if (idx !== -1) { states[i] = 'present'; targetArr[idx] = null; } } });

    states.forEach((state, i) => {
      setTimeout(() => {
        rowTiles[i].setAttribute('data-state', state);
        const key = document.querySelector(`.key[data-key="${guessArr[i]}"]`);
        if (key && key.getAttribute('data-state') !== 'correct') key.setAttribute('data-state', state);
      }, i * 150);
    });

    const isWin = currentGuess === targetLettersOnly;
    if (isWin || currentRow === attempts - 1) {
      gameOver = true;
      updateStats(isWin);
      setTimeout(() => showEndGame(isWin), letterCount * 150 + 500);
    } else {
      currentRow++;
      currentLetterIndex = 0;
    }
  }

  function updateStats(win) {
    stats.played++;
    if (win) {
      stats.wins++;
      stats.streak++;
      if (stats.streak > stats.maxStreak) stats.maxStreak = stats.streak;

      // Puan ekle
      const scoreIncrement = 1;
      let userEntry = globalLeaderboard.find(entry => entry.name === playerName);
      if (userEntry) {
        userEntry.score += scoreIncrement;
      } else {
        globalLeaderboard.push({ name: playerName, score: scoreIncrement });
      }

      // Sıralama
      globalLeaderboard.sort((a, b) => b.score - a.score);
      globalLeaderboard = globalLeaderboard.slice(0, 10);
      localStorage.setItem('globalLeaderboard', JSON.stringify(globalLeaderboard));
    } else {
      stats.streak = 0;
    }
    saveStats();
  }

  function toggleStats() {
    document.getElementById('stats-played').textContent = stats.played;
    document.getElementById('stats-winpct').textContent = stats.played ? Math.round((stats.wins / stats.played) * 100) : 0;
    document.getElementById('stats-streak').textContent = stats.streak;
    document.getElementById('stats-max').textContent = stats.maxStreak;

    // Kendi istatistikleri
    const lb = document.getElementById('leaderboard');
    lb.innerHTML = stats.bestRuns.length ? stats.bestRuns.map((r, i) => `
      <div class="leaderboard-item">
        <span><span class="rank">#${i + 1}</span> ${r.club}</span>
        <span>${r.guesses} tries • ${r.time}s</span>
      </div>
    `).join('') : '<p style="text-align:center; opacity:0.5; margin-top:20px;">Hiç galibiyet yok!</p>';

    // Global sıralama
    const globalLb = document.createElement('div');
    globalLb.className = 'leaderboard-list';
    globalLeaderboard.forEach((entry, index) => {
      globalLb.innerHTML += `
        <div class="leaderboard-item">
          <span><span class="rank">#${index + 1}</span> ${entry.name}</span>
          <span>${entry.score} Puan</span>
        </div>
      `;
    });
    // Mevcut ise değiştir
    const existingGlobalLb = document.getElementById('global-leaderboard');
    existingGlobalLb.innerHTML = '';
    existingGlobalLb.appendChild(globalLb);

    document.getElementById('stats-overlay').style.display = 'flex';
  }

  function showEndGame(win) {
    const modal = document.getElementById('stats-modal');
    const h2 = modal.querySelector('h2');

    if (win) {
      if (targetWord === normalize('Fenerbahce')) {
        modal.classList.add('win-fenerbahce');
        h2.innerHTML = "EN BÜYÜK FENERBAHÇE! 💛💙";
      } else if (targetWord === normalize('Galatasaray')) {
        h2.textContent = "Win... but sarı-kırmızı! 🍋";
      } else {
        h2.textContent = "G O O O A L !";
      }
    } else {
      h2.textContent = "FULL TIME";
    }
    toggleStats();
  }

  function handleInput(key) {
    if (gameOver) return;
    if (key === 'ENTER') submitGuess();
    else if (key === 'BACKSPACE') {
      if (currentLetterIndex > 0) {
        currentLetterIndex--;
        guesses[currentRow].pop();
        updateBoard();
      }
    } else if (/^[A-Z]$/.test(key)) {
      if (currentLetterIndex < letterCount) {
        guesses[currentRow].push(key);
        currentLetterIndex++;
        updateBoard();
      }
    }
  }

  window.addEventListener('keydown', e => handleInput(e.key.toUpperCase() === 'BACKSPACE' ? 'BACKSPACE' : e.key.toUpperCase()));
  document.getElementById('keyboard').addEventListener('click', e => {
    const key = e.target.closest('.key');
    if (key) handleInput(key.getAttribute('data-key'));
  });

  initBoard();
</script>
</body>
</html>
