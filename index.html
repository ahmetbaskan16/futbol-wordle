<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Football Wordle & Quiz</title>
</head>
<body>
    <h1>FOOTBALL HUB</h1>
    <div class="mode-switcher">
        <button class="mode-btn active" id="mode-club" onclick="switchMode('club')">KULÜP</button>
        <button class="mode-btn" id="mode-yolculuk" onclick="switchMode('yolculuk')">KULÜP YOLCULUĞU</button>
        <button class="mode-btn" id="mode-player" onclick="switchMode('player')">OYUNCU</button>
        <button class="mode-btn" id="mode-quiz" onclick="switchMode('quiz')">LOGO QUIZ</button>
    </div>
    <script>
        function switchMode(mode) {
            console.log("Switching to: " + mode);
        }
    </script>
</body>
</html>
