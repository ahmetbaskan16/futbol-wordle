<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Football Wordle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --correct-color: #4ade80;
            --present-color: #facc15;
            --absent-color: #475569;
            --tile-border: #334155;
            --fb-blue: #003399;
            --fb-yellow: #fdd017;
            --gs-red: #a90432;
            --gs-yellow: #fdb912;
            --glow-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 600px;
        }

        #game-board {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .tile {
            width: clamp(45px, 12vw, 62px);
            height: clamp(45px, 12vw, 62px);
            border: 2px solid var(--tile-border);
            background: var(--glass-bg);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .tile.space {
            border: none;
            background: transparent;
            backdrop-filter: none;
            width: 20px;
        }

        .tile.pop {
            transform: scale(1.1);
            border-color: #fff;
        }

        .tile[data-state="correct"] {
            background-color: var(--correct-color);
            border-color: var(--correct-color);
            color: #000;
            animation: flip 0.6s ease forwards;
        }

        .tile[data-state="present"] {
            background-color: var(--present-color);
            border-color: var(--present-color);
            color: #000;
            animation: flip 0.6s ease forwards;
        }

        .tile[data-state="absent"] {
            background-color: var(--absent-color);
            border-color: var(--absent-color);
            opacity: 0.6;
            animation: flip 0.6s ease forwards;
        }

        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .key {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 6px;
            padding: 15px 5px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            flex: 1;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            -webkit-tap-highlight-color: transparent;
        }

        .key:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }

        .key.large {
            flex: 1.5;
            font-size: 0.75rem;
        }

        .key[data-state="correct"] { background: var(--correct-color); color: #000; border-color: var(--correct-color); }
        .key[data-state="present"] { background: var(--present-color); color: #000; border-color: var(--present-color); }
        .key[data-state="absent"] { background: #1e293b; color: #64748b; border-color: transparent; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            text-align: center;
        }

        .modal {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .modal h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .modal p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn-restart {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.2);
        }

        /* EPIC FENERBAHCE WIN */
        .win-fenerbahce {
            border: 4px solid var(--fb-yellow) !important;
            box-shadow: 0 0 40px var(--fb-blue), inset 0 0 20px var(--fb-yellow) !important;
            background: linear-gradient(135deg, var(--fb-blue), #001a4d) !important;
        }
        .win-fenerbahce h2 {
            background: linear-gradient(to bottom, var(--fb-yellow) 0%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(253, 208, 23, 0.5);
        }

        .toast {
            position: fixed;
            top: 10%;
            background: #fff;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(-100px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
        }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <header>
        <h1>FOOTBALL WORDLE</h1>
        <div class="subtitle">THE ULTIMATE CLUB CHALLENGE</div>
    </header>

    <div id="game-container">
        <div id="game-board"></div>
        <div id="keyboard">
            <div class="kb-row">
                <button class="key" data-key="Q">Q</button>
                <button class="key" data-key="W">W</button>
                <button class="key" data-key="E">E</button>
                <button class="key" data-key="R">R</button>
                <button class="key" data-key="T">T</button>
                <button class="key" data-key="Y">Y</button>
                <button class="key" data-key="U">U</button>
                <button class="key" data-key="I">I</button>
                <button class="key" data-key="O">O</button>
                <button class="key" data-key="P">P</button>
            </div>
            <div class="kb-row">
                <button class="key" data-key="A">A</button>
                <button class="key" data-key="S">S</button>
                <button class="key" data-key="D">D</button>
                <button class="key" data-key="F">F</button>
                <button class="key" data-key="G">G</button>
                <button class="key" data-key="H">H</button>
                <button class="key" data-key="J">J</button>
                <button class="key" data-key="K">K</button>
                <button class="key" data-key="L">L</button>
            </div>
            <div class="kb-row">
                <button class="key large" data-key="ENTER">ENTER</button>
                <button class="key" data-key="Z">Z</button>
                <button class="key" data-key="X">X</button>
                <button class="key" data-key="C">C</button>
                <button class="key" data-key="V">V</button>
                <button class="key" data-key="B">B</button>
                <button class="key" data-key="N">N</button>
                <button class="key" data-key="M">M</button>
                <button class="key large" data-key="BACKSPACE">⌫</button>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div id="modal" class="modal">
            <h2 id="modal-title"></h2>
            <p id="modal-desc"></p>
            <button class="btn-restart" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const CLUBS = [
            // Turkish Clubs - Super Lig & TFF 1. Lig & More
            'Fenerbahce', 'Fenerbahce', 'Fenerbahce', 'Fenerbahce', 'Fenerbahce',
            'Galatasaray', 'Besiktas', 'Trabzonspor', 'Eyupspor', 'Basaksehir',
            'Kasimpasa', 'Sivasspor', 'Antalyaspor', 'Konyaspor', 'Alanyaspor',
            'Rizespor', 'Goztepe', 'Gaziantep', 'Samsunspor', 'Bodrumspor',
            'Adana Demirspor', 'Hatayspor', 'Kayserispor', 'Sakaryaspor', 'Ankaragucu',
            'Kocaelispor', 'Genclerbirligi', 'Altay', 'Istanbulspor', 'Bursaspor',
            'Eskisehirspor', 'Karagumruk', 'Umraniyespor', 'Pendikspor', 'Bandirmaspor',
            'Manisa FK', 'Corum FK', 'Erzurumspor', 'Boluspor', 'Adanaspor',
            'Sanliurfaspor', 'Keçiörengücü', 'Giresunspor', 'Iğdır FK', 'Amed SK',
            
            // Premier League
            'Manchester City', 'Arsenal', 'Liverpool', 'Aston Villa', 'Tottenham',
            'Newcastle', 'Manchester United', 'Chelsea', 'West Ham', 'Everton',
            'Brighton', 'Bournemouth', 'Fulham', 'Wolves', 'Brentford',
            'Crystal Palace', 'Leicester City', 'Ipswich Town', 'Southampton', 'Nottingham Forest',
            'Leeds United', 'Burnley', 'Watford', 'Sunderland', 'Middlesbrough',
            'Sheffield United', 'Norwich City', 'Hull City', 'Portsmouth', 'Derby County',

            // La Liga
            'Real Madrid', 'Barcelona', 'Atletico Madrid', 'Girona', 'Athletic Bilbao',
            'Real Sociedad', 'Real Betis', 'Villarreal', 'Valencia', 'Sevilla',
            'Osasuna', 'Getafe', 'Celta Vigo', 'Mallorca', 'Las Palmas',
            'Alaves', 'Leganes', 'Espanyol', 'Valladolid', 'Rayo Vallecano',
            'Cadiz', 'Granada', 'Almeria', 'Malaga', 'Deportivo La Coruna',

            // Serie A
            'Inter Milan', 'AC Milan', 'Juventus', 'Atalanta', 'Napoli',
            'AS Roma', 'Lazio', 'Fiorentina', 'Torino', 'Bologna',
            'Genoa', 'Monza', 'Verona', 'Udinese', 'Cagliari',
            'Empoli', 'Lecce', 'Parma', 'Como', 'Venezia',
            'Sassuolo', 'Salernitana', 'Sampdoria', 'Bari', 'Palermo',

            // Bundesliga
            'Bayer Leverkusen', 'Bayern Munich', 'Stuttgart', 'RB Leipzig', 'Borussia Dortmund',
            'Eintracht Frankfurt', 'Hoffenheim', 'Heidenheim', 'Werder Bremen', 'Freiburg',
            'Augsburg', 'Wolfsburg', 'Mainz', 'Monchengladbach', 'Union Berlin',
            'Bochum', 'St Pauli', 'Holstein Kiel', 'Schalke', 'Hamburg',
            'Hertha Berlin', 'Koln', 'Dusseldorf', 'Nurnberg', 'Kaiserslautern',

            // Ligue 1
            'PSG', 'Monaco', 'Brest', 'Lille', 'Nice',
            'Lyon', 'Lens', 'Marseille', 'Reims', 'Rennes',
            'Toulouse', 'Montpellier', 'Strasbourg', 'Le Havre', 'Nantes',
            'Auxerre', 'Angers', 'Saint Etienne', 'Lorient', 'Clermont',
            'Metz', 'Bordeaux', 'Ajaccio', 'Troyes', 'Valenciennes',

            // Other European
            'Ajax', 'PSV Eindhoven', 'Feyenoord', 'AZ Alkmaar', 'Benfica',
            'Porto', 'Sporting CP', 'Braga', 'Celtic', 'Rangers',
            'Anderlecht', 'Club Brugge', 'Union SG', 'Genk', 'Gent',
            'Red Bull Salzburg', 'Sturm Graz', 'LASK', 'Rapid Vienna', 'Austria Vienna',
            'Shakhtar Donetsk', 'Dynamo Kyiv', 'Sparta Prague', 'Slavia Prague', 'Viktoria Plzen',
            'Olympiacos', 'Panathinaikos', 'AEK Athens', 'PAOK', 'Dinamo Zagreb',
            'Hajduk Split', 'Red Star Belgrade', 'Partizan Belgrade', 'Steaua Bucharest', 'CFR Cluj',
            'Basel', 'Young Boys', 'FC Zurich', 'Servette', 'Malmo',

            // Rest of World
            'Al Nassr', 'Al Hilal', 'Al Ittihad', 'Al Ahli', 'Al Shabab',
            'Inter Miami', 'LA Galaxy', 'LAFC', 'New York City FC', 'Seattle Sounders',
            'Boca Juniors', 'River Plate', 'Flamengo', 'Palmeiras', 'Sao Paulo',
            'Santos', 'Corinthians', 'Fluminense', 'Gremio', 'Internacional',
            'Club America', 'Chivas', 'Cruz Azul', 'Tigres UANL', 'Monterrey',
            'Al Ahly', 'Zamalek', 'Wydad Casablanca', 'Mamelodi Sundowns', 'Urawa Reds'
        ];

        function normalize(str) {
            return str.toUpperCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/İ/g, 'I').replace(/Ğ/g, 'G').replace(/Ü/g, 'U')
                .replace(/Ş/g, 'S').replace(/Ö/g, 'O').replace(/Ç/g, 'C');
        }

        const rawTarget = CLUBS[Math.floor(Math.random() * CLUBS.length)];
        const targetWord = normalize(rawTarget);
        const targetLettersOnly = targetWord.replace(/[^A-Z]/g, '');
        const letterCount = targetLettersOnly.length;

        let currentRow = 0;
        let currentLetterIndex = 0;
        let gameOver = false;
        const attempts = 6;
        const guesses = Array.from({ length: attempts }, () => []);

        const board = document.getElementById('game-board');
        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('modal');
        const toast = document.getElementById('toast');

        function initBoard() {
            for (let i = 0; i < attempts; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.id = `row-${i}`;
                
                let letterIdx = 0;
                for (let char of targetWord) {
                    const tile = document.createElement('div');
                    if (char === ' ' || char === '-') {
                        tile.className = 'tile space';
                        tile.textContent = char;
                    } else {
                        tile.className = 'tile';
                        tile.id = `tile-${i}-${letterIdx}`;
                        letterIdx++;
                    }
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateBoard() {
            const rowTiles = document.querySelectorAll(`#row-${currentRow} .tile:not(.space)`);
            rowTiles.forEach((tile, idx) => {
                tile.textContent = guesses[currentRow][idx] || '';
                if (guesses[currentRow][idx]) {
                    tile.classList.add('pop');
                } else {
                    tile.classList.remove('pop');
                }
            });
        }

        async function submitGuess() {
            const currentGuessArray = guesses[currentRow];
            if (currentGuessArray.length !== letterCount) {
                showToast("NOT ENOUGH LETTERS");
                return;
            }

            const guessString = currentGuessArray.join('');
            if (guessString === normalize('Galatasaray')) {
                showToast("Cidden mi? Limon sıktın keyfimize... 🍋");
            }

            const rowTiles = document.querySelectorAll(`#row-${currentRow} .tile:not(.space)`);
            const targetArr = targetLettersOnly.split('');
            const guessArr = guessString.split('');
            const states = new Array(letterCount).fill('absent');

            for (let i = 0; i < letterCount; i++) {
                if (guessArr[i] === targetArr[i]) {
                    states[i] = 'correct';
                    targetArr[i] = null;
                }
            }

            for (let i = 0; i < letterCount; i++) {
                if (states[i] === 'correct') continue;
                const matchIdx = targetArr.indexOf(guessArr[i]);
                if (matchIdx !== -1) {
                    states[i] = 'present';
                    targetArr[matchIdx] = null;
                }
            }

            states.forEach((state, i) => {
                setTimeout(() => {
                    rowTiles[i].setAttribute('data-state', state);
                    updateKeyboardColor(guessArr[i], state);
                }, i * 150);
            });

            const win = guessString === targetLettersOnly;
            if (win || currentRow === attempts - 1) {
                gameOver = true;
                setTimeout(() => showEndGame(win), letterCount * 150 + 500);
            } else {
                currentRow++;
                currentLetterIndex = 0;
            }
        }

        function updateKeyboardColor(letter, state) {
            const key = document.querySelector(`.key[data-key="${letter}"]`);
            if (!key) return;
            const currentState = key.getAttribute('data-state');
            if (state === 'correct') {
                key.setAttribute('data-state', 'correct');
            } else if (state === 'present' && currentState !== 'correct') {
                key.setAttribute('data-state', 'present');
            } else if (state === 'absent' && !currentState) {
                key.setAttribute('data-state', 'absent');
            }
        }

        function showEndGame(win) {
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            
            if (win) {
                if (targetWord === normalize('Fenerbahce')) {
                    modal.classList.add('win-fenerbahce');
                    title.textContent = "EN BÜYÜK FENERBAHÇE! 💛💙";
                    desc.textContent = "The legends never fail. A glorious victory for the Yellow Canaries!";
                } else if (targetWord === normalize('Galatasaray')) {
                    title.textContent = "You Won... but at what cost?";
                    desc.textContent = "Sarı-kırmızı bir tat bıraktı. 🍋 Hope you're happy.";
                } else {
                    title.textContent = "G O O O A L !";
                    desc.textContent = `Magnificent! You identified ${rawTarget} in ${currentRow + 1} attempts.`;
                }
            } else {
                title.textContent = "FULL TIME";
                desc.textContent = `The whistle blows. You missed the target. The club was: ${rawTarget}`;
            }
            overlay.style.display = 'flex';
        }

        function handleInput(key) {
            if (gameOver) return;
            if (key === 'ENTER') {
                submitGuess();
            } else if (key === 'BACKSPACE') {
                if (currentLetterIndex > 0) {
                    currentLetterIndex--;
                    guesses[currentRow].pop();
                    updateBoard();
                }
            } else if (/^[A-Z]$/.test(key)) {
                if (currentLetterIndex < letterCount) {
                    guesses[currentRow].push(key);
                    currentLetterIndex++;
                    updateBoard();
                }
            }
        }

        window.addEventListener('keydown', e => handleInput(e.key.toUpperCase() === 'BACKSPACE' ? 'BACKSPACE' : e.key.toUpperCase()));
        document.getElementById('keyboard').addEventListener('click', e => {
            const key = e.target.closest('.key');
            if (key) handleInput(key.getAttribute('data-key'));
        });

        initBoard();
    </script>
</body>
</html>
