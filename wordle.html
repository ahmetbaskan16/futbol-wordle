<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏟️ Wordle - Futbol Wordle</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
    }
    .grid {
      display: grid;
      gap: 5px;
    }
    .row {
      display: flex;
      gap: 5px;
    }
    .tile {
      width: 50px;
      height: 50px;
      border: 2px solid #3a3a3c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      color: white;
    }
    .tile.correct { background-color: #538d4e; border-color: #538d4e; }
    .tile.present { background-color: #b59f3b; border-color: #b59f3b; }
    .tile.absent { background-color: #3a3a3c; border-color: #3a3a3c; }
    
    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 500px;
    }
    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 4px;
    }
    .key {
      background-color: #818384;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 15px 10px;
      cursor: pointer;
      font-weight: bold;
      min-width: 30px;
    }
    .key.wide { min-width: 60px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo"><div class="logo-icon">⚽</div><span class="logo-text">Futbol Wordle</span></a>
      <a href="index.html" class="user-avatar" style="text-decoration: none;">🏠</a>
    </div>
  </header>
  <main class="main container">
    <div id="game-container"></div>
  </main>
  <script src="js/app.js"></script>
  <script src="js/games.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.app = new FutbolWordleApp();
      window.game = new WordleGame();
    });
  </script>
</body>
</html>
